name: Main follow-up plan events

on:
  push:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      base_branch:
        description: Base branch to scan manually. Defaults to repository default branch.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: read
  checks: read
  statuses: read

jobs:
  main-follow-up-plan:
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read
      checks: read
      statuses: read
    uses: nozomu-honda/codex-workflow-kit/.github/workflows/main-follow-up-plan.yml@REPLACE_WITH_TAG_OR_40_CHAR_COMMIT_SHA
    with:
      event-name: ${{ github.event_name }}
      event-action: ${{ github.event.action || '' }}
      event-payload-json: ${{ toJson(github.event) }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      default-branch: ${{ github.event.repository.default_branch }}
      actor: ${{ github.actor }}
      ref-name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      dry-run: true
      repository-config-json: ${{ vars.CHATGPT_AUTOMATION_MAIN_FOLLOW_UP_CONFIG_JSON || '{}' }}
      existing-dedupe-keys: ${{ vars.CHATGPT_AUTOMATION_MAIN_FOLLOW_UP_DEDUPE_KEYS || '' }}
      attempt-counts-json: ${{ vars.CHATGPT_AUTOMATION_MAIN_FOLLOW_UP_ATTEMPT_COUNTS_JSON || '{}' }}
      last-attempted-at-json: ${{ vars.CHATGPT_AUTOMATION_MAIN_FOLLOW_UP_LAST_ATTEMPTED_AT_JSON || '{}' }}
      kit-ref: REPLACE_WITH_TAG_OR_40_CHAR_COMMIT_SHA
