name: Reviewed PR auto-merge plan events

on:
  workflow_run:
    types: [completed]
  check_suite:
    types: [completed]
  check_run:
    types: [completed]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited]
  pull_request:
    types: [closed, ready_for_review, synchronize]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to evaluate manually.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: read
  checks: read
  statuses: read

jobs:
  auto-merge-plan:
    permissions:
      contents: read
      pull-requests: read
      issues: read
      actions: read
      checks: read
      statuses: read
    uses: nozomu-honda/codex-workflow-kit/.github/workflows/auto-merge-plan.yml@REPLACE_WITH_TAG_OR_40_CHAR_COMMIT_SHA
    with:
      event-name: ${{ github.event_name }}
      event-action: ${{ github.event.action || '' }}
      event-payload-json: ${{ toJson(github.event) }}
      repository: ${{ github.repository }}
      repository-owner: ${{ github.repository_owner }}
      default-branch: ${{ github.event.repository.default_branch }}
      actor: ${{ github.actor }}
      ref-name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      dry-run: true
      repository-config-json: ${{ vars.CHATGPT_AUTOMATION_AUTO_MERGE_CONFIG_JSON || '{}' }}
      existing-dedupe-keys: ${{ vars.CHATGPT_AUTOMATION_AUTO_MERGE_DEDUPE_KEYS || '' }}
      last-planned-at: ${{ vars.CHATGPT_AUTOMATION_AUTO_MERGE_LAST_PLANNED_AT || '' }}
      kit-ref: REPLACE_WITH_TAG_OR_40_CHAR_COMMIT_SHA
